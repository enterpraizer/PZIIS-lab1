services:
  web:
    build: .
    container_name: smb_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret-key}
      DATABASE_URL: postgresql+psycopg2://smb_user:smb_pass@db:5432/smb_db
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: smb_db
    environment:
      POSTGRES_DB: smb_db
      POSTGRES_USER: smb_user
      POSTGRES_PASSWORD: smb_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smb_user -d smb_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
