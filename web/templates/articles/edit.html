{% extends "base.html" %}
{% block title %}Редактирование статьи{% endblock %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h4 class="mb-3">Редактирование статьи</h4>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input class="form-control" name="title" value="{{ article.title }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Категория</label>
                <select class="form-select" name="category_id" required>
                    {% for category in categories %}
                        <option value="{{ category.id }}" {% if article.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Текст</label>
                <textarea class="form-control" rows="8" name="content" required>{{ article.content }}</textarea>
            </div>
            <button class="btn btn-primary" type="submit">Сохранить изменения</button>
            <a href="{{ url_for('articles.view_article', article_id=article.id) }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
